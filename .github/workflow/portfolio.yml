name: Portfolio

on:
  push:
    branches: [main]
permissions:
  contents: read
  id-token: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy-pages.outputs.page_url }}
    steps:
    # This step is required to checkout the code from the repository
      - name: checkout code
        uses: actions/checkout@v4

        #setup github pages
      - name: setup github pagaes
        usage: actions/configure-pages@v4

      - name: uplosd static files
        usage: actions/upload-pages-artifact@v4

      - name: deploy to github pages
        usage: actions/deploy-pages@v4
